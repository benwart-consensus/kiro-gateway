version: "3.8"

# Debug override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.debug.yml up --build

services:
  kiro-gateway:
    build:
      context: .
      dockerfile: Dockerfile.debug
    ports:
      - "2234:8000"
      - "5678:5678" # debugpy
    volumes:
      - .:/app
    env_file:
      - .env
